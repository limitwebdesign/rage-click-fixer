<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Broken form example | Rage Click Fixer</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 32px; }
    form { max-width: 520px; display: grid; gap: 12px; }
    input, button { padding: 12px; }
    .cta-wrap { padding: 18px; border: 1px dashed #bbb; border-radius: 12px; }
  </style>
</head>
<body>
  <h1>Broken form example</h1>
  <form>
    <input placeholder="Email address">
    <div class="cta-wrap">This footer area looks clickable, but it is not.</div>
    <button id="submit">Submit form</button>
  </form>

  <script type="module">
    import { RageClickFixer } from "../src/core.js";
    const fixer = new RageClickFixer({ overlay: true, showHelper: true });
    fixer.start();
    document.getElementById("submit").addEventListener("click", (event) => {
      event.preventDefault();
      alert("Form submitted.");
    });
  </script>
</body>
</html>
