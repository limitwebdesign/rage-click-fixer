<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Ecommerce checkout example | Rage Click Fixer</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 32px; }
    .box { max-width: 640px; padding: 24px; border: 1px solid #ddd; border-radius: 14px; }
    button { padding: 12px 16px; margin-right: 10px; }
    .is-disabled { opacity: 0.45; }
  </style>
</head>
<body>
  <div class="box">
    <h1>Checkout friction example</h1>
    <p>Repeated clicks on the disabled checkout should trigger guidance.</p>
    <button class="is-disabled" aria-disabled="true">Pay now</button>
    <button id="backup">Use saved cart</button>
  </div>

  <script type="module">
    import { RageClickFixer } from "../src/core.js";
    const fixer = new RageClickFixer({ overlay: true, showHelper: true });
    fixer.start();
    document.getElementById("backup").addEventListener("click", () => alert("Backup checkout path opened."));
  </script>
</body>
</html>
